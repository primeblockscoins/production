<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .brand-gold { stroke: #c7984f; }
    .brand-body { stroke: #2A2A2A; }
    @media (prefers-color-scheme: dark) {
      .brand-body { stroke: #FFFFFF; }
    }
  </style>
  <!-- Film Reels on top -->
  <g>
    <!-- Left Reel -->
    <circle cx="9" cy="10" r="3.8" fill="none" class="brand-gold" stroke-width="1.5" />
    <line x1="9" y1="6.2" x2="9" y2="13.8" class="brand-gold" stroke-width="0.8" />
    <line x1="5.2" y1="10" x2="12.8" y2="10" class="brand-gold" stroke-width="0.8" />
  </g>

  <g>
    <!-- Right Reel -->
    <circle cx="17" cy="10" r="3.8" fill="none" class="brand-body" stroke-width="1.5" />
    <line x1="17" y1="6.2" x2="17" y2="13.8" class="brand-body" stroke-width="0.8" />
    <line x1="13.2" y1="10" x2="20.8" y2="10" class="brand-body" stroke-width="0.8" />
  </g>

  <!-- Simple Camera Body -->
  <rect
    x="7"
    y="14.5"
    width="12"
    height="8.5"
    fill="none"
    class="brand-body"
    stroke-width="1.8"
    stroke-linejoin="round"
    rx="0.5"
  />

  <!-- Matte Box / Lens Hood on the right -->
  <path
    d="M 19,16.5 L 24.5,14.5 V 21 L 19,19 Z"
    fill="none"
    class="brand-gold"
    stroke-width="1.8"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Lens connector detail -->
  <line
    x1="19"
    y1="19.5"
    x2="19"
    y2="16"
    class="brand-gold"
    stroke-width="1.8"
  />
</svg>